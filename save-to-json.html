<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Checkout</title>
    <style>
        :root {
            --primary-color: #0f172a;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --border-color: #e2e8f0;
            --text-main: #334155;
            --text-light: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .checkout-container {
            background: white;
            width: 100%;
            max-width: 1000px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            overflow: hidden;
        }

        /* Form / Left Column */
        .checkout-form-section {
            padding: 40px;
        }

        .brand-header {
            margin-bottom: 32px;
        }

        .brand-header h1 {
            font-size: 24px;
            color: var(--primary-color);
            font-weight: 700;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-light);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-main);
            transition: all 0.2s ease;
            background-color: #fff;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .divider {
            height: 1px;
            background-color: var(--border-color);
            margin: 30px 0;
        }

        /* Order Summary / Right Column */
        .order-summary-section {
            background-color: #f1f5f9;
            padding: 40px;
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .summary-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--primary-color);
        }

        .product-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .product-info h4 {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-color);
        }

        .product-info p {
            font-size: 12px;
            color: var(--text-light);
        }

        .product-price {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-color);
        }

        .price-breakdown {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 10px;
            color: var(--text-light);
        }

        .price-row.total {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary-color);
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px dashed var(--border-color);
        }

        .submit-btn {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 24px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .submit-btn:hover {
            background-color: var(--accent-hover);
        }

        /* Responsive UI */
        @media (max-width: 768px) {
            .checkout-container {
                grid-template-columns: 1fr;
            }
            .order-summary-section {
                border-left: none;
                border-top: 1px solid var(--border-color);
            }
        }
    </style>
</head>
<body>

<div class="checkout-container">
    <div class="checkout-form-section">
        <div class="brand-header">
            <h1>Aurora Shop</h1>
        </div>

        <form id="checkoutForm">
            <div class="section-title">1. Account Security</div>
            <div class="form-group-row">
                <div class="form-group">
                    <label for="username">Username / Email</label>
                    <input type="email" id="username" placeholder="alex@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Create Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>

            <div class="divider"></div>

            <div class="section-title">2. Shipping Details</div>
            <div class="form-group-row">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" placeholder="Alex" required>
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" placeholder="Morgan" required>
                </div>
            </div>
            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" placeholder="123 Main Street, Apt 4B" required>
            </div>
            <div class="form-group-row">
                <div class="form-group">
                    <label for="country">Country</label>
                    <select id="country" required>
                        <option value="United States">United States</option>
                        <option value="Canada">Canada</option>
                        <option value="United Kingdom">United Kingdom</option>
                        <option value="Sri Lanka">Sri Lanka</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="zipCode">Zip Code</label>
                    <input type="text" id="zipCode" placeholder="10001" required>
                </div>
            </div>
        </form>
    </div>

    <div class="order-summary-section">
        <div>
            <div class="summary-title">Order Summary</div>
            
            <div class="product-item">
                <div class="product-info">
                    <h4>Premium Wireless Headphones</h4>
                    <p>Qty: 1 • Midnight Black</p>
                </div>
                <div class="product-price">$249.00</div>
            </div>
            <div class="product-item">
                <div class="product-info">
                    <h4>Minimalist Desk Mat</h4>
                    <p>Qty: 1 • Felt Grey</p>
                </div>
                <div class="product-price">$35.00</div>
            </div>
        </div>

        <div class="price-breakdown">
            <div class="price-row">
                <span>Subtotal</span>
                <span>$284.00</span>
            </div>
            <div class="price-row">
                <span>Shipping</span>
                <span style="color: #10b981; font-weight: 500;">Free</span>
            </div>
            <div class="price-row">
                <span>Estimated Tax</span>
                <span>$22.72</span>
            </div>
            <div class="price-row total">
                <span>Total</span>
                <span>$306.72</span>
            </div>

            <button type="submit" form="checkoutForm" class="submit-btn">Complete Purchase</button>
        </div>
    </div>
</div>

<script>
    document.getElementById('checkoutForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // Package all checkout data elegantly into a structured object
        const checkoutData = {
            metadata: {
                site: "Aurora Shop Prototype",
                timestamp: new Date().toISOString(),
                orderTotal: "$306.72"
            },
            account: {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            },
            shipping: {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                address: document.getElementById('address').value,
                country: document.getElementById('country').value,
                zipCode: document.getElementById('zipCode').value
            },
            itemsOrdered: [
                { id: "p-01", name: "Premium Wireless Headphones", qty: 1, price: 249.00 },
                { id: "p-02", name: "Minimalist Desk Mat", qty: 1, price: 35.00 }
            ]
        };

        // Convert data structure to string
        const jsonString = JSON.stringify(checkoutData, null, 2);

        // Generate download action
        const blob = new Blob([jsonString], { type: "application/json" });
        const link = document.createElement("a");
        
        link.href = URL.createObjectURL(blob);
        link.download = "checkout_order.json";
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });
</script>

</body>
</html>
